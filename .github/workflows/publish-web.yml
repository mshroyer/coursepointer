name: publish-website
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build website
        uses: ./.github/actions/web

      - name: Publish to S3
        run: |
          scripts/publish_web.sh
